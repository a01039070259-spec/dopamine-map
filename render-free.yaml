# Render 무료 플랜 — 도메인 비용 0원 (서브도메인: YOUR-APP.onrender.com)
# ⚠️ 디스크 없음 → 재배포/슬립 후 SQLite 데이터가 사라질 수 있음
#    테스트·데모용으로 먼저 쓰고, 스팟이 쌓이면 render.yaml(Starter)로 전환 권장
services:
  - type: web
    name: dopamine-map
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
