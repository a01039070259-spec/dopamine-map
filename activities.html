<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>액티비티 검색 ⚡ — 도파민 지도</title>
  <meta name="description"
    content="전국 하드코어 액티비티를 스릴/익스트림·탈것/라이딩·수상 레저·어드벤처/탐험 4가지 카테고리로 검색하세요." />
  <link rel="canonical" href="https://dopamine-map.onrender.com/activities.html" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --neon: #39ff14;
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #161616;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #888;
      --text-muted: #555;
      /* 카테고리 색상 (스릴-빨강, 탈것-주황, 수상-파랑, 어드벤처-초록) */
      --cat-thrill: #ff4d4d;
      --cat-riding: #ff9124;
      --cat-water: #3aa0ff;
      --cat-adventure: #37d67a;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: rgba(10, 10, 10, .94);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      flex: none;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .back-btn:hover {
      border-color: var(--neon);
      color: var(--neon);
    }

    .topbar h1 {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -.3px;
    }

    .topbar h1 .zap {
      color: var(--neon);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 16px 64px;
    }

    /* ── SEARCH ── */
    .search {
      position: relative;
      margin-bottom: 16px;
    }

    .search input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 13px 14px 13px 42px;
      outline: none;
      transition: border-color .2s;
    }

    .search input:focus {
      border-color: var(--neon);
    }

    .search .ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: .6;
    }

    /* ── FILTER TABS (가로 스크롤) ── */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: 18px;
      scroll-snap-type: x proximity;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: none;
      scroll-snap-align: start;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all .18s ease;
    }

    .tab:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    .tab.active {
      color: #0a0a0a;
      background: var(--tab-color, var(--neon));
      border-color: var(--tab-color, var(--neon));
      box-shadow: 0 0 16px -4px var(--tab-color, var(--neon));
    }

    .count {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .count b {
      color: var(--neon);
    }

    /* ── GRID (모바일 1열 → 데스크탑 3~4열) ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1200px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--cat-color, var(--neon));
      box-shadow: 0 12px 30px -14px var(--cat-color, var(--neon));
    }

    .card-media {
      position: relative;
      aspect-ratio: 3 / 2;
      background: var(--card-bg, #1a0a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-media .emoji {
      font-size: 44px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .5));
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #0a0a0a;
      background: var(--cat-color, var(--neon));
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: -.2px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .35);
    }

    .card-body {
      padding: 13px 14px 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-sub {
      font-size: 12px;
      font-weight: 700;
      color: var(--cat-color, var(--neon));
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -.3px;
    }

    .card-addr {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-top: auto;
      display: flex;
      gap: 4px;
    }

    .card-addr .pin {
      flex: none;
      opacity: .7;
    }

    /* ── EMPTY / LOADING ── */
    .state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .state .big {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--border2);
      border-top-color: var(--neon);
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <a class="back-btn" href="/">← 지도</a>
    <h1>액티비티 검색 <span class="zap">⚡</span></h1>
  </header>

  <main class="wrap">
    <div class="search">
      <span class="ico">🔍</span>
      <input id="q" type="search" placeholder="이름 · 지역 · 종목으로 검색" autocomplete="off" />
    </div>

    <nav class="tabs" id="tabs" aria-label="카테고리 필터"></nav>

    <p class="count" id="count"></p>

    <section class="grid" id="grid" aria-live="polite"></section>

    <div class="state" id="loading">
      <div class="spinner"></div>
      액티비티 불러오는 중…
    </div>
  </main>

  <script>
    // ── 4가지 매크로 카테고리 정의 (색상: 스릴-빨강, 탈것-주황, 수상-파랑, 어드벤처-초록) ──
    const CATEGORIES = [
      { key: 'all', label: '전체', color: '#39ff14' },
      { key: 'thrill', label: '스릴/익스트림', color: 'var(--cat-thrill)', raw: '#ff4d4d' },
      { key: 'riding', label: '탈것/라이딩', color: 'var(--cat-riding)', raw: '#ff9124' },
      { key: 'water', label: '수상 레저', color: 'var(--cat-water)', raw: '#3aa0ff' },
      { key: 'adventure', label: '어드벤처/탐험', color: 'var(--cat-adventure)', raw: '#37d67a' },
    ];
    const CAT_COLOR = {
      thrill: '#ff4d4d', riding: '#ff9124', water: '#3aa0ff', adventure: '#37d67a',
    };
    const CAT_LABEL = {
      thrill: '스릴/익스트림', riding: '탈것/라이딩', water: '수상 레저', adventure: '어드벤처/탐험',
    };

    // ── 스팟 type → 매크로 카테고리 매핑 (모든 액티비티가 4개 중 하나에 반드시 속함) ──
    const TYPE_TO_CAT = {
      // 스릴/익스트림 — 고소공포/추락·자유낙하 계열
      zipline: 'thrill', bungee: 'thrill', swing: 'thrill', coaster: 'thrill',
      sky: 'thrill', paragliding: 'thrill', hangglider: 'thrill', balloon: 'thrill',
      aircraft: 'thrill', slide: 'thrill',
      // 탈것/라이딩 — 직접 운전·탑승·페달링
      kart: 'riding', atv: 'riding', amphibious: 'riding', luge: 'riding',
      horse: 'riding', skybike: 'riding', railbike: 'riding',
      // 수상 레저 — 물 위/속 활동
      jetboat: 'water', speedboat: 'water', whitewaterKayak: 'water', seawalk: 'water',
      // 어드벤처/탐험 — 장소 체험·탐험형
      monorail: 'adventure', cave: 'adventure', survivalGame: 'adventure',
      shooting: 'adventure', skywalk: 'adventure', netadv: 'adventure',
      highRopes: 'adventure', rockClimbing: 'adventure',
    };
    const catOf = (type) => TYPE_TO_CAT[type] || 'adventure';

    // ── 상태 ──
    const state = { active: 'all', q: '', spots: [] };

    const $tabs = document.getElementById('tabs');
    const $grid = document.getElementById('grid');
    const $count = document.getElementById('count');
    const $loading = document.getElementById('loading');
    const $q = document.getElementById('q');

    const esc = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');

    function renderTabs() {
      $tabs.innerHTML = CATEGORIES.map((c) => {
        const on = c.key === state.active;
        const color = c.raw || c.color;
        return `<button class="tab${on ? ' active' : ''}" data-key="${c.key}" style="--tab-color:${color}">${c.label}</button>`;
      }).join('');
    }

    function filtered() {
      const q = state.q.trim().toLowerCase();
      return state.spots.filter((s) => {
        if (state.active !== 'all' && catOf(s.type) !== state.active) return false;
        if (!q) return true;
        return (
          (s.name || '').toLowerCase().includes(q) ||
          (s.addr || '').toLowerCase().includes(q) ||
          (s.tl || '').toLowerCase().includes(q) ||
          (CAT_LABEL[catOf(s.type)] || '').toLowerCase().includes(q)
        );
      });
    }

    function cardHTML(s) {
      const cat = catOf(s.type);
      const color = CAT_COLOR[cat];
      const label = CAT_LABEL[cat];
      const media = s.hasImage
        ? `<img src="/api/spots/${s.id}/image" alt="${esc(s.name)}" loading="lazy" decoding="async" />`
        : `<span class="emoji">${esc(s.em || '🔥')}</span>`;
      const sub = esc(s.tl || s.categoryName || '액티비티');
      const region = esc((s.addr || '').split(' ').slice(0, 2).join(' '));
      return `<a class="card" href="/spot/${s.id}" style="--cat-color:${color};--card-bg:${esc(s.bg || '#1a0a2e')}">
        <div class="card-media">
          ${media}
          <span class="badge">${label}</span>
        </div>
        <div class="card-body">
          <div class="card-sub">${esc(s.em || '')} ${sub}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-addr"><span class="pin">📍</span><span>${region || '위치 정보'}</span></div>
        </div>
      </a>`;
    }

    function render() {
      const list = filtered();
      $count.innerHTML = `총 <b>${list.length}</b>개의 액티비티`;
      if (!list.length) {
        $grid.innerHTML = '';
        $grid.insertAdjacentHTML('beforeend',
          '<div class="state" style="grid-column:1/-1"><div class="big">🫥</div>조건에 맞는 액티비티가 없어요.</div>');
        return;
      }
      $grid.innerHTML = list.map(cardHTML).join('');
    }

    $tabs.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      state.active = btn.dataset.key;
      renderTabs();
      render();
    });

    let qTimer;
    $q.addEventListener('input', () => {
      clearTimeout(qTimer);
      qTimer = setTimeout(() => { state.q = $q.value; render(); }, 120);
    });

    async function load() {
      try {
        const res = await fetch('/api/spots');
        const data = await res.json();
        // 사이트 노출 규칙: 승인 + (좌표검증 OR 레거시)
        state.spots = (Array.isArray(data) ? data : [])
          .filter((s) => s && s.approved !== false && (s.coordVerified || s.legacy))
          .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
        $loading.style.display = 'none';
        renderTabs();
        render();
      } catch (err) {
        $loading.innerHTML = '<div class="big">⚠️</div>불러오지 못했어요. 새로고침 해주세요.';
      }
    }

    renderTabs();
    load();
  </script>
</body>

</html>
